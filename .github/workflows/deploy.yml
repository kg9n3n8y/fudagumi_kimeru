name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'assets/**'
      - 'sw.js'
      - 'workbox-*.js'
      - 'manifest.webmanifest'
      - 'index.html'

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run deploy:copy

      - uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions[bot]
          author_email: github-actions[bot]@users.noreply.github.com
          message: 'deploy: ビルド成果物をルートへ反映'
          add: 'index.html assets icon.png manifest.webmanifest sw.js workbox-*.js'
          push: true
